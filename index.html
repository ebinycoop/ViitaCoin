<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VitaCoin — Everyday Living to YHWH's Glory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #06191d 0%, #020b0d 100%); font-family: system-ui, sans-serif; }
        .gold-glow { box-shadow: 0 0 30px rgba(212, 175, 55, 0.25); }
        .gold-text-gradient { background: linear-gradient(180deg, #f3e7c4 0%, #d4af37 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="text-slate-200 min-h-screen flex flex-col">

<header class="max-w-6xl mx-auto px-6 py-6 flex justify-between items-center border-b border-emerald-950/40">
    <div class="flex items-center gap-3">
        <svg width="48" height="48" viewBox="0 0 280 280" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="140" cy="140" r="118" fill="#1E2937" stroke="#F4C95D" stroke-width="22"/>
            <g transform="translate(140 140) scale(0.95)">
                <path d="M-65 -45 L-8 65 L8 65 L65 -45" fill="none" stroke="#10B981" stroke-width="28" stroke-linejoin="round"/>
                <path d="M-65 -45 L-8 65 L8 65 L65 -45" fill="none" stroke="#F4C95D" stroke-width="18" stroke-linejoin="round"/>
                <path d="M-48 -68 Q-25 -88 0 -68 Q25 -88 48 -68" fill="none" stroke="#F4C95D" stroke-width="20"/>
                <text x="0" y="12" text-anchor="middle" fill="#F4C95D" font-size="48" font-weight="900">V</text>
            </g>
        </svg>
        <span class="text-2xl font-black">Vita<span class="text-amber-400">Coin</span></span>
    </div>

    <div class="flex items-center gap-4">
        <a href="whitepaper.md" target="_blank" class="px-5 py-2.5 border border-slate-400 hover:border-amber-400 rounded-2xl text-sm">Whitepaper</a>
        <a href="roadmap.md" target="_blank" class="px-5 py-2.5 border border-slate-400 hover:border-amber-400 rounded-2xl text-sm">Roadmap</a>
        
        <select id="walletSelect" onchange="connectWallet()" class="bg-amber-400 text-slate-950 px-5 py-2.5 rounded-2xl font-bold">
            <option value="">Connect Wallet</option>
            <option value="phantom">Phantom</option>
            <option value="solflare">Solflare</option>
            <option value="backpack">Backpack</option>
            <option value="ledger">Ledger</option>
            <option value="brave">Brave Wallet</option>
            <option value="solana-mobile">Solana Mobile</option>
        </select>
    </div>
</header>

<main class="max-w-6xl mx-auto px-6 py-8">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black tracking-tighter">Everyday Living to YHWH's Glory</h1>
        <p class="text-slate-400">Real spending → Real wealth on Solana</p>
    </div>

    <div id="walletStatus" class="hidden mb-8 p-6 bg-emerald-900/30 border border-emerald-500 rounded-3xl text-center gold-glow">
        <p id="walletText" class="text-emerald-400 font-bold">Wallet Connected</p>
    </div>

    <!-- Velocity Meters -->
    <div class="grid md:grid-cols-2 gap-6 mb-8">
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
            <div class="flex justify-between text-xs mb-2"><span>Groceries (Max 1/week)</span><span id="groceryLabel">0/1</span></div>
            <div class="h-2 bg-slate-800 rounded-full"><div id="groceryBar" class="h-2 bg-amber-400 rounded-full w-0"></div></div>
        </div>
        <div class="bg-slate-900 border border-slate-700 rounded-3xl p-6">
            <div class="flex justify-between text-xs mb-2"><span>Cash Withdrawals (Max 2/mo)</span><span id="cashLabel">0/2</span></div>
            <div class="h-2 bg-slate-800 rounded-full"><div id="cashBar" class="h-2 bg-red-400 rounded-full w-0"></div></div>
        </div>
    </div>

    <!-- Receipt Terminal -->
    <div class="bg-slate-900 border border-slate-700 rounded-3xl p-8">
        <h3 class="text-2xl font-bold mb-6 flex items-center gap-2">Receipt Verification Terminal</h3>
        
        <button onclick="simulatePlaid()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-3 rounded-2xl mb-6 font-bold">Link Bank via Plaid (Simulated)</button>

        <div class="grid md:grid-cols-2 gap-6">
            <div>
                <label class="block text-xs uppercase text-slate-400 mb-2">Category</label>
                <select id="category" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4">
                    <option value="housing">Housing/Rent (10%)</option>
                    <option value="groceries">Groceries (1%)</option>
                    <option value="gas">Gas/Fuel (1%)</option>
                    <option value="bills">Utilities/Bills (2%)</option>
                    <option value="cash">Cash Withdrawal (1%)</option>
                </select>
            </div>
            <div>
                <label class="block text-xs uppercase text-slate-400 mb-2">Amount ($)</label>
                <input type="number" id="amount" placeholder="1250" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 text-lg">
            </div>
        </div>

        <button onclick="submitSpend()" class="mt-8 w-full bg-gradient-to-r from-amber-500 to-amber-400 py-5 rounded-2xl font-bold text-xl">
            Verify Receipt & Mint VITA
        </button>
    </div>

    <!-- Scam Detector Log -->
    <div class="mt-8 bg-slate-900 border border-slate-700 rounded-3xl p-6">
        <h4 class="font-bold mb-4">Security Log</h4>
        <div id="securityLog" class="font-mono text-xs text-emerald-400 h-40 overflow-y-auto space-y-1"></div>
    </div>

    <!-- Activity Log -->
    <div id="activityLog" class="mt-8 space-y-4"></div>
</main>

<footer class="text-center py-12 text-xs text-slate-500">
    © 2026 VitaCoin • Open Source • Fair Launch
</footer>

<script>
    let walletConnected = false;
    let cashCount = 0;
    let groceryCount = 0;

    function connectWallet() {
        const val = document.getElementById('walletSelect').value;
        if (!val) return;
        walletConnected = true;
        document.getElementById('walletStatus').classList.remove('hidden');
        document.getElementById('walletText').innerText = `${val.toUpperCase()} Connected`;
    }

    function simulatePlaid() {
        alert("Plaid Bank Link Simulated - Transactions auto-detected");
        addSecurityLog("Bank ledger connected successfully");
    }

    function addSecurityLog(msg) {
        const log = document.getElementById('securityLog');
        const entry = document.createElement('div');
        entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
        log.appendChild(entry);
        log.scrollTop = log.scrollHeight;
    }

    function submitSpend() {
        if (!walletConnected) return alert("Connect a wallet first");

        const category = document.getElementById('category').value;
        const amount = parseFloat(document.getElementById('amount').value) || 0;
        if (amount <= 0) return alert("Enter amount");

        let rate = 0;
        if (category === "housing") rate = 0.10;
        else if (category === "groceries") {
            rate = 0.01;
            groceryCount++;
            if (groceryCount > 1) addSecurityLog("Grocery weekly limit warning");
        }
        else if (category === "gas") rate = 0.01;
        else if (category === "bills") rate = 0.02;
        else if (category === "cash") {
            rate = 0.01;
            cashCount++;
            if (cashCount > 2) return alert("Cash limit (2/month) reached");
        }

        const earned = (amount * rate).toFixed(2);

        const log = document.getElementById('activityLog');
        const entry = document.createElement('div');
        entry.className = "bg-slate-900 border border-emerald-500/30 p-5 rounded-2xl";
        entry.innerHTML = `<div class="flex justify-between"><div><span class="capitalize font-bold">${category}</span><br>$${amount}</div><div class="text-right"><span class="text-emerald-400 font-bold">+${earned} VITA</span></div></div>`;
        log.prepend(entry);

        addSecurityLog(`Mint successful: +${earned} VITA for ${category}`);
        alert(`✅ Verified! +${earned} VITA minted`);
    }
</script>
</body>
</html>
